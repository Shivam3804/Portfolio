<svg width="400" height="400" viewBox="0 0 400 400" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Shivam Patil – Portfolio profile placeholder</title>
  <desc>A circular avatar with aurora-themed neural network illustration in cyan, magenta, and icy blue on a deep dark background.</desc>

  <defs>
    <clipPath id="av">
      <circle cx="200" cy="200" r="168"/>
    </clipPath>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="45%" stop-color="#b0e8ff"/>
      <stop offset="100%" stop-color="#ff00c8"/>
    </linearGradient>
    <linearGradient id="bg" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#080b1a"/>
      <stop offset="100%" stop-color="#0d1024"/>
    </linearGradient>
    <linearGradient id="aurora1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ff00c8" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="aurora2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b0e8ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Outer glow halo -->
  <circle cx="200" cy="200" r="185" fill="#00e5ff" opacity="0.04"/>
  <circle cx="200" cy="200" r="180" fill="#ff00c8" opacity="0.04"/>

  <!-- Ring border -->
  <circle cx="200" cy="200" r="176" fill="none" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#b0e8ff" stroke-width="0.6" opacity="0.3"/>

  <!-- Avatar dark bg -->
  <circle cx="200" cy="200" r="168" fill="url(#bg)"/>

  <!-- Aurora wash -->
  <ellipse cx="160" cy="140" rx="140" ry="80" fill="url(#aurora1)" clip-path="url(#av)"/>
  <ellipse cx="250" cy="270" rx="130" ry="70" fill="url(#aurora2)" clip-path="url(#av)"/>

  <!-- Neural connections -->
  <g clip-path="url(#av)" fill="none" stroke-width="1.1" opacity="0.5">
    <line x1="115" y1="118" x2="178" y2="168" stroke="#00e5ff"/>
    <line x1="178" y1="168" x2="252" y2="143" stroke="#b0e8ff"/>
    <line x1="252" y1="143" x2="295" y2="202" stroke="#ff00c8"/>
    <line x1="115" y1="118" x2="148" y2="232" stroke="#00e5ff"/>
    <line x1="148" y1="232" x2="178" y2="168" stroke="#b0e8ff"/>
    <line x1="178" y1="168" x2="232" y2="252" stroke="#00e5ff"/>
    <line x1="232" y1="252" x2="295" y2="202" stroke="#ff00c8"/>
    <line x1="148" y1="232" x2="232" y2="252" stroke="#b0e8ff"/>
    <line x1="252" y1="143" x2="232" y2="252" stroke="#b0e8ff"/>
    <line x1="232" y1="252" x2="198" y2="302" stroke="#00e5ff"/>
    <line x1="148" y1="232" x2="198" y2="302" stroke="#ff00c8"/>
    <line x1="295" y1="202" x2="262" y2="282" stroke="#ff00c8"/>
    <line x1="262" y1="282" x2="198" y2="302" stroke="#b0e8ff"/>
    <line x1="115" y1="118" x2="168" y2="88" stroke="#b0e8ff"/>
    <line x1="168" y1="88" x2="252" y2="143" stroke="#00e5ff"/>
    <line x1="168" y1="88" x2="178" y2="168" stroke="#ff00c8" opacity="0.4"/>
    <line x1="252" y1="143" x2="295" y2="115" stroke="#b0e8ff" opacity="0.5"/>
    <line x1="115" y1="118" x2="95" y2="190" stroke="#ff00c8" opacity="0.4"/>
    <line x1="95" y1="190" x2="148" y2="232" stroke="#00e5ff" opacity="0.4"/>
  </g>

  <!-- Floating symbols -->
  <g clip-path="url(#av)" font-family="monospace">
    <text x="76" y="158" font-size="26" fill="#00e5ff" fill-opacity="0.15">{</text>
    <text x="304" y="132" font-size="20" fill="#b0e8ff" fill-opacity="0.15">∑</text>
    <text x="102" y="288" font-size="18" fill="#ff00c8" fill-opacity="0.15">&lt;/&gt;</text>
    <text x="272" y="298" font-size="16" fill="#00e5ff" fill-opacity="0.14">01</text>
    <text x="193" y="78" font-size="14" fill="#b0e8ff" fill-opacity="0.18">fn()</text>
    <text x="70" y="218" font-size="14" fill="#ff00c8" fill-opacity="0.15">∇</text>
    <text x="307" y="258" font-size="14" fill="#00e5ff" fill-opacity="0.15">λ</text>
    <text x="208" y="330" font-size="12" fill="#b0e8ff" fill-opacity="0.14">[]</text>
  </g>

  <!-- Neural nodes -->
  <g clip-path="url(#av)">
    <circle cx="178" cy="168" r="11" fill="#00e5ff" opacity="0.9"/>
    <circle cx="178" cy="168" r="5" fill="#e0faff"/>

    <circle cx="232" cy="252" r="11" fill="#00e5ff" opacity="0.85"/>
    <circle cx="232" cy="252" r="5" fill="#e0faff"/>

    <circle cx="115" cy="118" r="8" fill="#00e5ff" opacity="0.8"/>
    <circle cx="115" cy="118" r="3.5" fill="#e0faff"/>

    <circle cx="295" cy="202" r="10" fill="#ff00c8" opacity="0.85"/>
    <circle cx="295" cy="202" r="4.5" fill="#ffe0f8"/>

    <circle cx="198" cy="302" r="9" fill="#ff00c8" opacity="0.8"/>
    <circle cx="198" cy="302" r="4" fill="#ffe0f8"/>

    <circle cx="252" cy="143" r="10" fill="#b0e8ff" opacity="0.9"/>
    <circle cx="252" cy="143" r="4.5" fill="#f0fbff"/>

    <circle cx="148" cy="232" r="9" fill="#b0e8ff" opacity="0.85"/>
    <circle cx="148" cy="232" r="4" fill="#f0fbff"/>

    <circle cx="168" cy="88" r="8" fill="#b0e8ff" opacity="0.8"/>
    <circle cx="168" cy="88" r="3.5" fill="#f0fbff"/>

    <circle cx="262" cy="282" r="7" fill="#ff00c8" opacity="0.75"/>
    <circle cx="262" cy="282" r="3" fill="#ffe0f8"/>

    <circle cx="295" cy="115" r="4" fill="#b0e8ff" opacity="0.6"/>
    <circle cx="95" cy="190" r="4" fill="#ff00c8" opacity="0.5"/>
    <circle cx="208" cy="115" r="3.5" fill="#00e5ff" opacity="0.5"/>
    <circle cx="307" cy="255" r="3.5" fill="#b0e8ff" opacity="0.5"/>
  </g>

  <!-- Scanlines -->
  <g clip-path="url(#av)" opacity="0.03">
    <line x1="32" y1="60" x2="368" y2="60" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="80" x2="368" y2="80" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="100" x2="368" y2="100" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="120" x2="368" y2="120" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="140" x2="368" y2="140" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="160" x2="368" y2="160" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="180" x2="368" y2="180" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="200" x2="368" y2="200" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="220" x2="368" y2="220" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="240" x2="368" y2="240" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="260" x2="368" y2="260" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="280" x2="368" y2="280" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="300" x2="368" y2="300" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="320" x2="368" y2="320" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="340" x2="368" y2="340" stroke="#fff" stroke-width="2"/>
    <line x1="32" y1="360" x2="368" y2="360" stroke="#fff" stroke-width="2"/>
  </g>
</svg>
